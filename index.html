<!DOCTYPE html>

<head>

<title>第15屆風險管理基本能力測驗 互動刷題</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','微軟正黑體',sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.hdr{background:linear-gradient(135deg,#1e3a5f,#2d6a9f);color:#fff;padding:18px 24px;text-align:center}
.hdr h1{font-size:1.18rem;font-weight:700;margin-bottom:4px}
.hdr p{font-size:0.8rem;opacity:.85}
.pbw{background:#e2e8f0;height:6px}
.pb{background:linear-gradient(90deg,#3b82f6,#06b6d4);height:6px;transition:width .4s}
.sbar{display:flex;justify-content:space-between;align-items:center;padding:8px 18px;background:#fff;border-bottom:1px solid #e2e8f0;font-size:.82rem;color:#4a5568;flex-wrap:wrap;gap:6px}
.badge{background:#ebf8ff;color:#2b6cb0;border-radius:20px;padding:2px 10px;font-size:.76rem;font-weight:700}
.badge.p2{background:#fef3c7;color:#92400e}
.wrap{max-width:800px;margin:18px auto;padding:0 14px}
.card{background:#fff;border-radius:13px;box-shadow:0 4px 16px rgba(0,0,0,.08);padding:22px;margin-bottom:12px}
.qhdr{display:flex;align-items:flex-start;gap:11px;margin-bottom:14px}
.qnum{background:#1e3a5f;color:#fff;border-radius:9px;min-width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;flex-shrink:0}
.qnum.p2{background:#d97706}
.qtxt{font-size:.95rem;line-height:1.7;color:#2d3748;font-weight:500}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:9px;padding:11px 13px;border:2px solid #e2e8f0;border-radius:9px;background:#fafafa;cursor:pointer;text-align:left;font-size:.9rem;color:#2d3748;transition:all .17s;line-height:1.5;width:100%}
.opt:hover:not(:disabled){border-color:#90cdf4;background:#ebf8ff;transform:translateX(3px)}
.olbl{background:#e2e8f0;border-radius:5px;min-width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;transition:all .17s}
.opt.correct{border-color:#48bb78;background:#f0fff4}
.opt.correct .olbl{background:#48bb78;color:#fff}
.opt.wrong{border-color:#fc8181;background:#fff5f5}
.opt.wrong .olbl{background:#fc8181;color:#fff}
.opt.reveal{border-color:#68d391;background:#f0fff4}
.opt.reveal .olbl{background:#68d391;color:#fff}
.opt:disabled{cursor:default}
.fb{display:none;margin-top:13px;padding:10px 13px;border-radius:8px;font-size:.86rem;font-weight:600}
.fb.show{display:block}
.fb.correct{background:#f0fff4;color:#276749;border:1px solid #9ae6b4}
.fb.wrong{background:#fff5f5;color:#9b2335;border:1px solid #feb2b2}
.navr{display:flex;justify-content:space-between;align-items:center;gap:9px;margin-top:16px;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:8px;border:none;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .17s}
.btnp{background:#2b6cb0;color:#fff}.btnp:hover{background:#1e3a5f}
.btns{background:#e2e8f0;color:#4a5568}.btns:hover{background:#cbd5e0}
.btnd{background:#e53e3e;color:#fff}.btnd:hover{background:#c53030}
.btn:disabled{opacity:.4;cursor:default}
.dotrow{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:13px}
.dot{width:16px;height:16px;border-radius:4px;cursor:pointer;background:#e2e8f0;transition:all .14s}
.dot.cur{background:#2b6cb0}
.dot.ok{background:#48bb78}
.dot.ng{background:#fc8181}
.dot:hover{transform:scale(1.25)}
.sc-wrap,.ss-wrap{background:#fff;border-radius:13px;box-shadow:0 4px 16px rgba(0,0,0,.1);padding:34px 26px;text-align:center;max-width:560px;margin:34px auto}
.sc-wrap h2,.ss-wrap h2{font-size:1.35rem;color:#1e3a5f;margin-bottom:9px}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:16px 0}
.ibox{background:#f7fafc;border-radius:8px;padding:11px}
.ibox .lbl{font-size:.72rem;color:#718096;margin-bottom:3px}
.ibox .val{font-size:1rem;font-weight:800;color:#2d3748}
.sbig{font-size:3.6rem;font-weight:900;color:#2b6cb0;margin:12px 0}
.sdtl{display:flex;justify-content:center;gap:26px;margin:16px 0}
.sdtl div{text-align:center}
.sdtl .lbl{font-size:.76rem;color:#718096}
.sdtl .val{font-size:1.25rem;font-weight:800;color:#2d3748}
.sdtl .val.g{color:#276749}
.sdtl .val.r{color:#c53030}
.rbar{background:#e2e8f0;border-radius:999px;height:10px;margin:8px 0 18px;overflow:hidden}
.rfill{background:linear-gradient(90deg,#3b82f6,#06b6d4);height:100%;border-radius:999px;transition:width 1s}
.grade{font-size:.96rem;font-weight:700;margin-bottom:18px}
.grade.pass{color:#276749}
.grade.fail{color:#c53030}
</style>
</head>
<body>
<div class="hdr">
  <h1>台灣金融研訓院 第15屆風險管理基本能力測驗</h1>
  <p>科目：風險管理制度與實務 ｜ 互動刷題練習</p>
</div>
<div class="pbw"><div class="pb" id="pb"></div></div>

<div id="SS" class="wrap">
  <div class="ss-wrap">
    <h2>📋 測驗說明</h2>
    <p style="color:#718096;font-size:.92rem;margin-bottom:6px">本題庫依據第15屆正式試題製作</p>
    <p style="color:#718096;font-size:.86rem;margin-bottom:4px">題目順序與選項順序均隨機排列</p>
    <div class="igrid">
      <div class="ibox"><div class="lbl">第一部分（1~40題）</div><div class="val">每題 1.5 分</div></div>
      <div class="ibox"><div class="lbl">第二部分（41~60題）</div><div class="val">每題 2 分</div></div>
      <div class="ibox"><div class="lbl">總題數</div><div class="val">60 題</div></div>
      <div class="ibox"><div class="lbl">總分</div><div class="val">100 分</div></div>
    </div>
    <p style="font-size:.82rem;color:#e53e3e;margin-bottom:18px">⚠️ 答錯不倒扣，及格標準 70 分</p>
    <button class="btn btnp" style="font-size:1rem;padding:12px 36px" onclick="startQuiz()">開始測驗 🚀</button>
  </div>
</div>

<div id="QS" style="display:none">
  <div class="sbar">
    <div>題目 <strong id="cq">1</strong> / 60 &emsp;<span class="badge" id="pbadge">第一部分 1.5分</span></div>
    <div>✅ <strong id="cc">0</strong> &emsp;❌ <strong id="wc">0</strong> &emsp;得分 <strong id="sc">0</strong></div>
  </div>
  <div class="wrap">
    <div class="dotrow" id="DR"></div>
    <div class="card">
      <div class="qhdr">
        <div class="qnum" id="QN">1</div>
        <div class="qtxt" id="QT"></div>
      </div>
      <div class="opts" id="OC"></div>
      <div class="fb" id="FB"></div>
      <div class="navr">
        <button class="btn btns" id="PB" onclick="go(-1)">◀ 上一題</button>
        <button class="btn btnd" onclick="finish()">交卷</button>
        <button class="btn btnp" id="NB" onclick="go(1)">下一題 ▶</button>
      </div>
    </div>
  </div>
</div>

<div id="RS" style="display:none" class="wrap">
  <div class="sc-wrap">
    <h2>🎓 測驗結果</h2>
    <div class="sbig" id="FS">0</div>
    <div class="rbar"><div class="rfill" id="RF" style="width:0%"></div></div>
    <div class="grade" id="GT"></div>
    <div class="sdtl">
      <div><div class="lbl">答對</div><div class="val g" id="RC">0</div></div>
      <div><div class="lbl">答錯</div><div class="val r" id="RW">0</div></div>
      <div><div class="lbl">未答</div><div class="val" id="RK">0</div></div>
    </div>
    <div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:13px">
      <button class="btn btns" onclick="doReview()">📖 檢閱答題</button>
      <button class="btn btnp" onclick="restart()">🔄 重新測驗</button>
    </div>
  </div>
</div>

<div id="RVS" style="display:none" class="wrap"></div>

<script>
const RQ=[
{o:1,s:1.5,t:"下列何者屬於銀行的表外非衍生性業務？",ops:["金融交換","遠期契約","擔保信用狀","不動產證券化契約"],a:2},
{o:2,s:1.5,t:"「借長貸短」的資金部位，可能存在何種風險？",ops:["再投資風險","再融資風險","市場價值風險","信用風險"],a:0},
{o:3,s:1.5,t:"銀行營業單位有 100 億元放款資產及 60 億元存款負債，已知放款利率 9%、存款利率 4%、聯行往來利率為 7%，請計算營業單位的營運利潤？",ops:["1.8 億元","2 億元","3.8 億元","5 億元"],a:2},
{o:4,s:1.5,t:"關於營運利潤、財務利潤與會計利潤之關係，下列敘述何者錯誤？",ops:["會計利潤為營運利潤與財務利潤相加","財務利潤為內部移轉價格與市場價格的差額","營運利潤為顧客價格與內部移轉價格的差額","會計利潤為內部損益與外部損益的合計，不同營業單位的內部損益相抵銷時，合計數通常不為零"],a:3},
{o:5,s:1.5,t:"利潤中心制度最好使用下列何者當作績效衡量指標？",ops:["營業利益","邊際貢獻","可控制利益","淨利(Net Income)"],a:2},
{o:6,s:1.5,t:"將各項作業費用，按不同分攤基礎分攤至產品，一般稱此成本管理模式為下列何者？",ops:["實際成本法","正常成本法","作業基礎成本法","標準成本法"],a:2},
{o:7,s:1.5,t:"下列何種風險不包括在客戶「信用風險值」的計算過程？",ops:["違約風險(Default Risk)","回收風險(Recovery Risk)","暴露風險(Exposure Risk)","作業風險(Operation Risk)"],a:3},
{o:8,s:1.5,t:"本國銀行以「內保外貸」承作陸資企業授信之運作模式，係指下列何者？",ops:["借款企業需提供外資銀行開立的擔保信用狀，擔保該借款客戶履行合約義務或責任","借款企業之負責人需提供連帶保證，擔保該借款客戶履行合約義務或責任","借款企業需提供銀行存單做為放款之擔保品","借款企業需提供其境外子公司做為放款擔保人，共同承擔履約義務"],a:0},
{o:9,s:1.5,t:"有關企業貸款的利率水準，下列敘述何者錯誤？",ops:["基準利率旨在反映短期資金市場的走勢，概由個別銀行所主導","基準利率通常決定於信用市場的寬鬆與緊俏","信用等級佳的企業，信用等級加碼低","就相同借戶而言，擔保貸款利率通常低於信用貸款利率"],a:0},
{o:10,s:1.5,t:"企業金融業務的信用評分與評等制度，下列敘述何者錯誤？",ops:["信用評分越高，信用等級越佳","「5P 授信原則」的構成項目，包括借戶的還款來源與債權保障，但未包括資金用途","信用等級加計一碼，意指借戶的貸款利率加計 0.25%","授信展望係依據授信戶的發展潛力加以衡量"],a:1},
{o:11,s:1.5,t:"丁公司 2019 年 12 月 31 日的流動資產為 90,381 萬元、長期投資 33,422 萬元、固定資產 207,005 萬元、流動負債 41,189 萬元、長期負債 29,000 萬元 、淨值或股東權益 261,754 萬元，請問該公司的固定長期適合率為多少？",ops:["78%","81%","83%","85%"],a:2},
{o:12,s:1.5,t:"消費金融業務的信用評等與風險管理，下列敘述何者錯誤？",ops:["銀行與消金客戶發生理賠爭議，會破壞「公平待客」的誠信原則","銀行取得足額擔保時，仍得要求借款人提供「保證人」","銀行辦理「無擔保」授信而徵取的保證人，以「一定保證金額」為限","向保證人求償時，保證人有數人時，各保證人先平均求償"],a:1},
{o:13,s:1.5,t:"仁愛銀行辦理信用卡業務時，每名好客戶平均每年創造 1,050 元利潤，又知該銀行的再投資報酬率為 5%，過去與這類好客戶平均維持 3 年的往來，請問該銀行延攬一名好客戶可為其創造多少利潤？",ops:["2,659 元","2,759 元","2,859 元","2,959 元"],a:2},
{o:14,s:1.5,t:"Moody's 信評公司將短期別債券之信用等級分為 Prime-1、Prime-2、Prime-3 以及 Not-Prime。請問其中 Not-Prime 類似於長期債券何項信用等級以下？",ops:["Aa1","A1","Baa1","Ba1"],a:3},
{o:15,s:1.5,t:"企業想籌措自有資金，透過興櫃、上櫃或上市途徑，發行的金融商品屬於下列何者？",ops:["票券","債券","債務憑證","權益證券"],a:3},
{o:16,s:1.5,t:"有關授信對象「授信總餘額」之敘述，下列何者錯誤？",ops:["同一自然人，不得超過銀行淨值 3%","同一法人，不得超過銀行淨值 20%","同一關係人，不得超過銀行淨值 40%","同一關係人無擔保授信，不得超過銀行淨值 10%"],a:1},
{o:17,s:1.5,t:"為避免承擔過高的信用風險，銀行會以客戶和產業為對象訂定風險限額。經由銀行內部自建的評等模型，計算出的風險限額稱為下列何者？",ops:["信用風險值","授信總餘額","融資額度","信用暴險額"],a:0},
{o:18,s:1.5,t:"銀行彙總授信對象所隸屬國家，可了解國家風險的高低。若授信對象登記在開曼群島時，應：",ops:["以該授信對象之所有人所屬國別認列","將該授信對象彙整入高風險類之其他國別","將該授信對象之國別風險彙整入開曼群島","以該授信對象資金主要使用所在地國別認列"],a:3},
{o:19,s:1.5,t:"銀行公會的信用評分制度，不包括申貸企業哪項構面或內容？",ops:["產業特性暨展望","經營管理","授信與外匯往來的利潤貢獻","財務狀況"],a:2},
{o:20,s:1.5,t:"銀行授信或風險管理主管依主觀經驗與判斷，考量借戶有否警示性財務比率、重複計算定性指標的分數、黑名單等資訊，並做等級調整，屬於何種評等？",ops:["基本模型的評等","授信戶的個別評等","授信特徵評等","財務評等"],a:1},
{o:21,s:1.5,t:"依據標準普爾信評公司(S&P)之國家主權評等，下列哪些評級屬於非投資等級？ (A) C 級 (B) B 級 (C) BB 級 (D) BBB 級",ops:["僅(A)","僅(A)(B)(C)","僅(A)(B)(D)","(A)(B)(C)(D)"],a:1},
{o:22,s:1.5,t:"依銀行法規定，下列何者非屬銀行？",ops:["保險公司","商業銀行","專業銀行","信託投資公司"],a:0},
{o:23,s:1.5,t:"台灣的票券金融公司資本適足率未達多少時，不得設立分公司？",ops:["未達 6%","未達 8%","未達 10%","未達 12%"],a:1},
{o:24,s:1.5,t:"A 銀行於 110 年 12 月 31 日之資本適足率、第一類資本比率和普通股權益比率分別為 9%、8%和 6.5%，依銀行資本適足性及資本等級管理辦法之資本等級劃分標準，應歸類為下列何者？",ops:["資本適足","資本不足","資本顯著不足","資本嚴重不足"],a:1},
{o:25,s:1.5,t:"巴塞爾資本協定增訂之流動性風險指標，下列敘述何者錯誤？",ops:["流動性覆蓋比率係指高品資的流動資產除以 30 天期之淨現金流出","流動性覆蓋比率大於 100%，意指銀行在監理機關嚴峻的流動性管理下，有足夠能力處分資產、換取現金","淨穩定資金比率係指法定穩定資金除以可取得的穩定資金","淨穩定資金比率強調支應資產和業務活動的資金，至少須一定比率來自於穩定的負債"],a:2},
{o:26,s:1.5,t:"保險業經營人身保險業務，其風險構成項目包括下列哪些？ A.保險風險 B.利率風險 C.資產風險 D.資產負債配置風險",ops:["僅 AB","僅 CD","僅 ABC","ABCD"],a:2},
{o:27,s:1.5,t:"有關保險公司的資本適足率與業務限制，下列敘述何者錯誤？",ops:["人身保險業之資本適足率達 200%以上者，可申請辦理外幣收付之非投資型人身保險業務","最近一年的資本適足率達 200%以上時，得申請設立國外子公司或分公司","保險公司的資本適足率達 300%以上時，得申請從事增加投資效益之衍生性金融商品交易","財務和業務健全的財產保險公司，最近一年之資本適足率達 200%時，可申請「傷害保險」及「健康保險」"],a:2},
{o:28,s:1.5,t:"有關授信案之回收風險，下列敘述何者錯誤？",ops:["銀行訴諸法律，用意在請求法院裁定財產之處分權，以回收相關借款","擔保品及第三人保證，是因應違約發生採取之債權保障措施，為備而不用之風險管理制度","客戶違約時，銀行沒收或出售擔保品，以降低或消除信用損失，同時將信用風險移轉為回收風險與資產價值風險","回收風險具體反映在擔保品之帳面價值"],a:3},
{o:29,s:1.5,t:"客戶申貸時，提供第三人保證可提升銀行或有債權，假設借款人與保證人的違約機率分別為 1%與 0.5%，隨著第三人保證，承貸銀行的違約機率成為下列何者？",ops:["1.50%","1.00%","0.01%","0.005%"],a:3},
{o:30,s:1.5,t:"A 銀行買入國庫券新臺幣 10 億元，根據「標準法」，該筆國庫券之信用風險性資產為何？",ops:["0","2 億元","5 億元","10 億元"],a:0},

{o:53,s:2,t:"針對銀行發行「金融債券」，資本適足率應達到的標準，下列何者錯誤？",ops:["普通股權益比率達百分之七","第一類資本比率達百分之八點五","資本適足比率達百分之十一點五","未達資本適足率最低標準，但經主管機關核准發行最低面額新臺幣一千萬元"],a:2},
{o:54,s:2,t:"銀行有四個借款戶 A、B、C、D，借款金額相同，其違約機率分別為 0.3%、0.5%、0.8%、1%，回收率分別為 50%、20%、30%、70%，在其他因素均一樣下，四個客戶之信用風險高低為何？",ops:["C>B>D>A","D>C>B>A","D>C>A>B","D>A>C>B"],a:0},
{o:55,s:2,t:"有關信用風險各項指標的計算，下列何項計算公式錯誤?",ops:["表外非衍生性業務的信用相當額 = 交易金額 × 信用轉換係數","表外衍生性業務的信用相當額 = 當期暴險額 + 潛在暴險額","資本適足率 = 第一類合格資本／風險性資產","損失準備覆蓋率 = 損失準備／不良授信資產"],a:2},
{o:56,s:2,t:"某銀行承做兩筆衍生性金融交易，其一為名目本金$200,000，期別 5 年的利率交換契約，計算權數為 0.005，當期暴險額為 5,000，另一筆為名目本金$100,000，期別 3 年的外匯交換契約，計算權數為 0.05，當期暴險額為 3,000，請問該銀行的潛在暴險額為何？",ops:["3,000","6,000","7,000","14,000"],a:1},
{o:57,s:2,t:"有關市場風險中，主要部位之價格風險，下列敘述何者正確？",ops:["假設債券之利率敏感係數為 5，利率若變動 0.01%，債券價格將變動 0.05%","債券之敏感性因子主要是指利率，也就是債券之票面利率","「PVBP」係指利率變動 1%，債券價格將變動多少數額","有一 10,000 元之債券，敏感性係數為 5，殖利率上升 0.01%，將使債券價格上升 5 元，成為 10,005 元"],a:0},

{o:60,s:2,t:"有關銀行的作業風險管理，從監督管理層面觀察有三道防線，下列敘述何者錯誤？",ops:["第一道防線，指營業單位的自評及自行查核","第二道防線，包括總行業務管理單位、風險管理及法令遵循部門","第三道防線，包括銀行董事會轄下的稽核處","第三道防線，不包括董事會轄下的風險管理委會、監事會"],a:3}

let Qs=[],UA=[],AN=[],cur=0,cc=0,wc=0;
const shuf=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;};

function startQuiz(){
  Qs=shuf(RQ).map(q=>{const ix=shuf([0,1,2,3]);return{...q,dops:ix.map(i=>q.ops[i]),ca:ix.indexOf(q.a)};});
  UA=Array(60).fill(-1);AN=Array(60).fill(false);cc=0;wc=0;cur=0;
  document.getElementById('SS').style.display='none';
  document.getElementById('QS').style.display='block';
  buildDots();render();
}

function buildDots(){
  const r=document.getElementById('DR');r.innerHTML='';
  for(let i=0;i<60;i++){const d=document.createElement('div');d.className='dot';d.title=`第${i+1}題`;d.onclick=(()=>{const n=i;return()=>{cur=n;render();};})();r.appendChild(d);}
  upd();
}

function upd(){
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.className='dot';
    if(i===cur)d.classList.add('cur');
    else if(AN[i])d.classList.add(UA[i]===Qs[i].ca?'ok':'ng');
  });
}

function render(){
  const q=Qs[cur];const p2=q.o>=41;
  document.getElementById('cq').textContent=cur+1;
  const b=document.getElementById('pbadge');b.textContent=p2?'第二部分 2分':'第一部分 1.5分';b.className=p2?'badge p2':'badge';
  const qn=document.getElementById('QN');qn.textContent=cur+1;qn.className=p2?'qnum p2':'qnum';
  document.getElementById('QT').textContent=q.t;
  const oc=document.getElementById('OC');oc.innerHTML='';
  const L=['(1)','(2)','(3)','(4)'];
  q.dops.forEach((op,i)=>{
    const btn=document.createElement('button');btn.className='opt';
    if(AN[cur]){btn.disabled=true;
      if(i===q.ca)btn.classList.add(UA[cur]===i?'correct':'reveal');
      else if(i===UA[cur])btn.classList.add('wrong');}
    btn.innerHTML=`<span class="olbl">${L[i]}</span><span>${op}</span>`;
    btn.onclick=()=>sel(i);oc.appendChild(btn);
  });
  const fb=document.getElementById('FB');
  if(AN[cur]){fb.className='fb show '+(UA[cur]===q.ca?'correct':'wrong');
    fb.textContent=UA[cur]===q.ca?`✅ 答對！正確答案是 ${L[q.ca]} ${q.dops[q.ca]}`:`❌ 答錯！正確答案是 ${L[q.ca]} ${q.dops[q.ca]}`;}
  else{fb.className='fb';fb.textContent='';}
  document.getElementById('pb').style.width=((cur+1)/60*100)+'%';
  document.getElementById('PB').disabled=cur===0;
  document.getElementById('NB').disabled=cur===59;
  document.getElementById('cc').textContent=cc;
  document.getElementById('wc').textContent=wc;
  let s=0;Qs.forEach((q,i)=>{if(AN[i]&&UA[i]===q.ca)s+=q.s;});
  document.getElementById('sc').textContent=s.toFixed(1);
  upd();
}

function sel(i){
  if(AN[cur])return;
  const q=Qs[cur];UA[cur]=i;AN[cur]=true;
  if(i===q.ca)cc++;else wc++;
  render();
  if(cur<59)setTimeout(()=>{if(AN[cur])go(1);},1200);
}

function go(d){const n=cur+d;if(n<0||n>59)return;cur=n;render();}

function finish(){if(!confirm('確定要交卷嗎？未作答題目將不計分。'))return;showRes();}

function showRes(){
  document.getElementById('QS').style.display='none';
  document.getElementById('RS').style.display='block';
  let ts=0,c=0,w=0,sk=0;
  Qs.forEach((q,i)=>{if(!AN[i]){sk++;return;}if(UA[i]===q.ca){c++;ts+=q.s;}else w++;});
  document.getElementById('FS').textContent=ts.toFixed(1);
  document.getElementById('RC').textContent=c;document.getElementById('RW').textContent=w;document.getElementById('RK').textContent=sk;
  document.getElementById('pb').style.width='100%';
  setTimeout(()=>document.getElementById('RF').style.width=ts+'%',100);
  const gt=document.getElementById('GT');
  if(ts>=70){gt.textContent=`🎉 恭喜通過！得分 ${ts.toFixed(1)} 分（及格 70 分）`;gt.className='grade pass';}
  else{gt.textContent=`💪 繼續努力！得分 ${ts.toFixed(1)} 分，未達及格標準 70 分`;gt.className='grade fail';}
}

function doReview(){
  document.getElementById('RS').style.display='none';
  const rv=document.getElementById('RVS');rv.style.display='block';rv.innerHTML='';
  const h=document.createElement('h2');h.style.cssText='text-align:center;margin:18px 0;color:#1e3a5f;font-size:1.2rem;';h.textContent='📖 答題檢閱';rv.appendChild(h);
  const L=['(1)','(2)','(3)','(4)'];
  Qs.forEach((q,i)=>{
    const p2=q.o>=41;const ok=AN[i]&&UA[i]===q.ca;const ic=AN[i]?(ok?'✅':'❌'):'⬜';
    const c=document.createElement('div');c.className='card';c.style.marginBottom='9px';
    c.innerHTML=`<div class="qhdr"><div class="qnum${p2?' p2':''}" style="font-size:.78rem;min-width:34px;height:34px">${ic}</div>
    <div><div style="font-size:.7rem;color:#718096;margin-bottom:2px">第 ${i+1} 題（原題 ${q.o}）・${q.s} 分</div>
    <div class="qtxt">${q.t}</div></div></div>
    <div>${q.dops.map((op,oi)=>{
      let st='';if(oi===q.ca)st='border-color:#48bb78;background:#f0fff4';
      else if(AN[i]&&oi===UA[i])st='border-color:#fc8181;background:#fff5f5';
      return`<div style="display:flex;gap:7px;align-items:center;padding:6px 10px;border:2px solid #e2e8f0;border-radius:7px;margin-bottom:4px;font-size:.86rem;${st}">
        <span style="font-weight:700;color:#4a5568;flex-shrink:0">${L[oi]}</span><span>${op}</span>
        ${oi===q.ca?'<span style="margin-left:auto;color:#276749;font-weight:700;white-space:nowrap">✓正確</span>':''}
        ${AN[i]&&oi===UA[i]&&oi!==q.ca?'<span style="margin-left:auto;color:#c53030;font-weight:700;white-space:nowrap">您的答案</span>':''}
      </div>`;}).join('')}</div>`;
    rv.appendChild(c);
  });
  const bb=document.createElement('button');bb.className='btn btnp';bb.textContent='🔄 重新測驗';
  bb.style.cssText='display:block;margin:18px auto 36px;font-size:.9rem;padding:10px 28px';bb.onclick=restart;rv.appendChild(bb);
}

function restart(){
  ['RS','RVS'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('SS').style.display='block';
  document.getElementById('pb').style.width='0%';
}
</script>
